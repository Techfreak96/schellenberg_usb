# Services for Schellenberg USB integration

pair:
  name: Pair device
  description: Activate pairing mode on the Schellenberg USB stick to pair a new blind motor. After calling this service, press the pairing button on your blind motor within 10 seconds.

send_native_group_command:
  name: Send native group command
  description: Send a Schellenberg native group command through the USB stick so all receivers on the selected group/channel react at the same time.
  fields:
    action:
      name: Action
      description: Group action to send.
      required: true
      selector:
        select:
          options:
            - up
            - down
            - stop
            - open
            - close
    group_id:
      name: Group ID
      description: Two-character Schellenberg group/channel byte. Use 05 for the fifth/all channel used by 5-channel remotes.
      required: false
      selector:
        text:

set_blind_lock:
  name: Set blind safety lock
  description: Lock or unlock a blind to prevent it from closing (DOWN command). When locked, the blind can still be opened or stopped for safety reasons.
  fields:
    device_id:
      name: Device ID
      description: The 6-character hex device ID of the blind (e.g., A1B2C3). Find it in the device info or logs.
      required: true
      selector:
        text:
    locked:
      name: Locked
      description: Set to true to block DOWN commands, false to allow them again.
      required: false
      default: true
      selector:
        boolean:
